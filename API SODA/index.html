<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API SODA Colombia - Barrios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Barrios de Barranquilla</h1>
        <p class="subtitle">Datos desde API SODA - Portal de Datos Abiertos de Colombia</p>
        
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Buscar barrio por nombre o localidad..."
                autocomplete="off"
            >
            <button id="searchBtn">Buscar</button>
            <button id="loadAllBtn">Cargar Todo</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            Cargando datos...
        </div>

        <div id="stats" class="stats" style="display: none;"></div>

        <div id="results" class="results"></div>
        <div id="error" class="error"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
